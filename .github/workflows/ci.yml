name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  no-text-storage:
    name: No-text-storage policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check forbidden field names
        run: bash scripts/check-no-text-storage.sh

  backend:
    name: Backend (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install WeasyPrint system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b fonts-dejavu-core

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy app/

      - name: Pytest
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: ci-jwt-secret
          ENCRYPTION_KEY: ci-encryption-key
          MINIO_ROOT_USER: ci-minio-user
          MINIO_ROOT_PASSWORD: ci-minio-password
          CELERY_BROKER_URL: redis://localhost:6379/0
        run: pytest

  nlp:
    name: NLP service (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nlp_service
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: nlp_service/requirements-dev.txt

      - name: Install torch (CPU-only)
        run: pip install --index-url https://download.pytorch.org/whl/cpu torch==2.7.1

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy app/

      - name: Pytest
        run: pytest

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  docker-build:
    name: Docker compose build (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all services
        run: docker compose build
